services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vpn_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn_password}
      POSTGRES_DB: ${POSTGRES_DB:-vpn_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vpn_user} -d ${POSTGRES_DB:-vpn_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  bot:
    build: .
    command: python -m app.main_bot
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  api:
    build: .
    command: python -m app.main_api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEBHOOK_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  pgdata:
